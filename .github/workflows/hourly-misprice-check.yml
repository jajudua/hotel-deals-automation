name: Hourly Hotel Misprice Check

on:
  schedule:
    - cron: '1 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-misprices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4

      - name: Run misprice checker
        env:
          OUTPUT_DIR: ${{ github.workspace }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: python misprice_checker.py

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"

      - name: Commit and push updates
        run: |
          touch misprice-log.txt deals-log.txt
          git add luxury-hotel-deals-report.html misprice-log.txt deals-log.txt
          git diff --staged --quiet || git commit -m "🔴 Dashboard update: $(date +'%Y-%m-%d %H:%M UTC')"
          git push || echo "Nothing to push"

      - name: Log execution
        run: |
          echo "✓ Check completed at $(date)"
