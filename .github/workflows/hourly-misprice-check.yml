name: Hourly Hotel Misprice Check

on:
  schedule:
    - cron: '1 * * * *'  # Run at :01 minutes every hour
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-misprices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4

      - name: Run misprice checker
        env:
          OUTPUT_DIR: ${{ github.workspace }}
        run: python misprice_checker.py

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"

      - name: Commit and push updates
        run: |
          git add luxury-hotel-deals-report.html misprice-log.txt
          git commit -m "🚨 Dashboard update: $(date +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push

      - name: Log execution
        run: |
          echo "✓ Misprice check completed at $(date)"
          echo "Files checked: misprice-log.txt, luxury-hotel-deals-report.html"
